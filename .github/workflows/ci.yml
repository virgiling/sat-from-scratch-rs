name: Deploy Rustdoc to GitHub Pages

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build documentation
        run: cargo doc --no-deps --document-private-items
      - name: Publish crate docs at site root
        run: |
          cp -a target/doc/easy_sat_rs/. target/doc/
          python3 - <<'PY'
          from pathlib import Path
          for path in Path("target/doc").rglob("*.html"):
              content = path.read_text(encoding="utf-8")
              updated = content.replace("easy_sat_rs/index.html", "index.html")
              if updated != content:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./target/doc

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
